<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Perfis OLGA (.ppl)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; max-width: 700px; margin: auto; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #0056b3; margin-top: 0; }
        select, button, input { margin: 15px 0; padding: 12px; width: 100%; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; cursor: pointer; border: none; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #status, #progresso { color: #555; font-size: 0.95em; font-weight: bold; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Extrator de PPL (OLGA) para CSV</h2>
    <p>Selecione seu arquivo <b>.ppl</b>. O processamento é feito no seu navegador por blocos contínuos.</p>
    
    <input type="file" id="fileInput" accept=".ppl">
    <div id="status"></div>
    
    <div id="step2" class="hidden">
        <label for="varSelect"><b>Selecione a Variável para Extrair:</b></label>
        <select id="varSelect"></select>
        <button id="btnBaixar" onclick="processarEBaixar()">Extrair e Baixar CSV</button>
        <div id="progresso"></div>
    </div>
</div>

<script>
let arquivoAtual = null;

// Variáveis globais do header do OLGA
let GLOBAL_N = 0; 
let GLOBAL_V = 0;
let GLOBAL_DISTANCIAS = [];
let GLOBAL_VARIAVEIS = [];

const fileInput = document.getElementById('fileInput');
const varSelect = document.getElementById('varSelect');
const step2 = document.getElementById('step2');
const status = document.getElementById('status');
const progresso = document.getElementById('progresso');
const btnBaixar = document.getElementById('btnBaixar');

fileInput.onchange = async function(e) {
    arquivoAtual = e.target.files[0];
    if (!arquivoAtual) return;

    status.innerHTML = "Analisando malha e catálogo de variáveis...";
    step2.classList.add('hidden');

    // Lê os primeiros 10MB para garantir que pegamos toda a geometria e catálogo
    const pedacoCabecalho = arquivoAtual.slice(0, 10 * 1024 * 1024); 
    const textoCabecalho = await pedacoCabecalho.text();
    
    const sucesso = mapearCabecalhoOLGA(textoCabecalho);
    
    if (sucesso) {
        varSelect.innerHTML = "";
        GLOBAL_VARIAVEIS.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v;
            opt.innerHTML = v;
            varSelect.appendChild(opt);
        });

        status.innerHTML = `✅ Malha identificada: ${GLOBAL_N} pontos. Variáveis: ${GLOBAL_V}. Arquivo: ${(arquivoAtual.size / 1024 / 1024).toFixed(2)} MB`;
        step2.classList.remove('hidden');
        progresso.innerHTML = "";
    } else {
        status.innerHTML = "❌ Não foi possível ler a GEOMETRY ou o CATALOG. Verifique se é um arquivo de PROFILE PLOT válido.";
    }
};

function mapearCabecalhoOLGA(texto) {
    GLOBAL_N = 0;
    GLOBAL_V = 0;
    GLOBAL_DISTANCIAS = [];
    GLOBAL_VARIAVEIS = [];
    
    let linhas = texto.split('\n');
    let state = 'SEARCH_GEOM';
    let valsRead = 0;

    for (let i = 0; i < linhas.length; i++) {
        let linha = linhas[i].trim();
        if (!linha) continue;

        if (state === 'SEARCH_GEOM') {
            if (linha.includes('GEOMETRY')) state = 'FIND_N';
        } else if (state === 'FIND_N') {
            // Pega o primeiro número inteiro isolado (quantidade de pontos na malha, ex: 238)
            if (/^\d+$/.test(linha)) {
                GLOBAL_N = parseInt(linha);
                state = 'READ_DIST';
            }
        } else if (state === 'READ_DIST') {
            // Extrai as distâncias em blocos
            let parts = linha.split(/\s+/);
            for (let p of parts) {
                GLOBAL_DISTANCIAS.push(p);
                valsRead++;
                if (valsRead === GLOBAL_N) {
                    state = 'SEARCH_CATALOG';
                    break;
                }
            }
        } else if (state === 'SEARCH_CATALOG') {
            if (linha.includes('CATALOG')) state = 'FIND_V';
        } else if (state === 'FIND_V') {
            // Pega o número de variáveis no catálogo
            if (/^\d+$/.test(linha)) {
                GLOBAL_V = parseInt(linha);
                state = 'READ_VARS';
            }
        } else if (state === 'READ_VARS') {
            // O nome da variável é a primeira palavra entre aspas da linha
            let varName = linha.split(/\s+/)[0].replace(/'/g, "");
            GLOBAL_VARIAVEIS.push(varName);
            if (GLOBAL_VARIAVEIS.length === GLOBAL_V) {
                return true; // Tudo lido com sucesso!
            }
        }
    }
    return false;
}

async function processarEBaixar() {
    const varAlvo = varSelect.value;
    const targetVarIndex = GLOBAL_VARIAVEIS.indexOf(varAlvo);
    
    btnBaixar.disabled = true;
    progresso.innerHTML = "Iniciando varredura da Time Series... 0%";

    const CHUNK_SIZE = 10 * 1024 * 1024; // 10MB por leitura
    let offset = 0;
    let sobraAnterior = "";

    let dadosPorTempo = {}; 
    let state = 'SEARCH_TIME_SERIES';
    let currentVarIndex = 0;
    let valuesRead = 0;
    let currentTime = "";

    // Varredura por Chunks
    while (offset < arquivoAtual.size) {
        let porcentagem = Math.round((offset / arquivoAtual.size) * 100);
        progresso.innerHTML = `Lendo arquivo de dados... ${porcentagem}%`;

        const chunk = arquivoAtual.slice(offset, offset + CHUNK_SIZE);
        const textoChunk = await chunk.text();
        
        let linhas = (sobraAnterior + textoChunk).split('\n');
        sobraAnterior = linhas.pop(); 

        for (let i = 0; i < linhas.length; i++) {
            let linha = linhas[i].trim();
            if (!linha) continue;

            if (state === 'SEARCH_TIME_SERIES') {
                if (linha.includes('TIME SERIES')) {
                    state = 'READ_TIME';
                }
            } 
            else if (state === 'READ_TIME') {
                let parts = linha.split(/\s+/);
                currentTime = "T_" + parts[0] + "s"; // Pega o número do tempo
                dadosPorTempo[currentTime] = [];
                currentVarIndex = 0;
                valuesRead = 0;
                state = 'READ_VAR';
                
                // Se houver dados na mesma linha que o tempo (raro, mas seguro prever)
                for (let j = 1; j < parts.length; j++) {
                    if (currentVarIndex === targetVarIndex) {
                        dadosPorTempo[currentTime].push(parts[j]);
                    }
                    valuesRead++;
                    if (valuesRead === GLOBAL_N) {
                        currentVarIndex++;
                        valuesRead = 0;
                        if (currentVarIndex === GLOBAL_V) state = 'READ_TIME';
                    }
                }
            } 
            else if (state === 'READ_VAR') {
                let parts = linha.split(/\s+/);
                for (let p of parts) {
                    if (currentVarIndex === targetVarIndex) {
                        dadosPorTempo[currentTime].push(p);
                    }
                    valuesRead++;
                    // Se leu os 238 (GLOBAL_N) valores, passa para a próxima variável do catálogo
                    if (valuesRead === GLOBAL_N) {
                        currentVarIndex++;
                        valuesRead = 0;
                        // Se já leu todas as variáveis deste tempo, o próximo bloco é um tempo novo
                        if (currentVarIndex === GLOBAL_V) {
                            state = 'READ_TIME';
                        }
                    }
                }
            }
        }
        offset += CHUNK_SIZE;
    }

    progresso.innerHTML = "Montando o arquivo CSV final...";

    let tempos = Object.keys(dadosPorTempo);
    if (tempos.length === 0) {
        progresso.innerHTML = "❌ Nenhum dado encontrado no Time Series.";
        btnBaixar.disabled = false;
        return;
    }

    // Monta o CSV (Primeira coluna = Distância)
    let csvArray = ["Distancia," + tempos.join(",")];

    for (let i = 0; i < GLOBAL_N; i++) {
        let linhaCsv = GLOBAL_DISTANCIAS[i];
        tempos.forEach(t => {
            linhaCsv += "," + (dadosPorTempo[t][i] !== undefined ? dadosPorTempo[t][i] : "");
        });
        csvArray.push(linhaCsv);
    }

    const blob = new Blob([csvArray.join('\n')], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${varAlvo}_perfis.csv`;
    a.click();
    window.URL.revokeObjectURL(url); 

    progresso.innerHTML = "✅ Download concluído e extração de blocos finalizada!";
    btnBaixar.disabled = false;
}
</script>
</body>
</html>
